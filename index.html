<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- talwind link -->
     <link href="./src/output.css" rel="stylesheet">
     <!-- boxi icons  -->
      <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
      <!-- google font -->
       <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">     
</head>
<body>
    <!-- log in  -->
   <main class=" flex justify-center items-center min-h-screen">
         <div class="card w-96 bg-white shadow-sm">
  <div class="card-body justify-center">
    <div class="flex justify-center">
        <img src="./assets/github-logo.png" alt="git-hub-logo">
    </div>
    <div>
        <h2 class="text-[24px] text-[#1F2937] text-center">GitHub Issues Tracker</h2>
        <p class="text-[16px] text-[#64748B] text-center">Sign in to manage your issues</p>
    </div>
    <label class="label">Username</label>
  <input type="text" class="input" id="user" placeholder="Enter Username" />
  <label class="label">Password</label>
  <input type="password" id="Password" class="input" placeholder="Enter Password" />
  <p id="error" class="text-red-400   mt-2 hidden"> <i class='bx bxs-error-circle'></i> Invalid username or password!</p>
    <div class="mt-6">
      <button id="submitBtn" class="btn btn-primary btn-block hover:bg-black">Sign In</button>
    </div>
  </div>
  
</div>
   </main>
   <script src="./script/script.js" ></script>
</body>
</html>
